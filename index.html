<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inclusify HQ — Live Ops</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #05050f;
      --cyan: #00f5ff;
      --purple: #a855f7;
      --green: #22d3a5;
      --orange: #f97316;
      --magenta: #ec4899;
      --blue: #60a5fa;
      --white: #e2e8f0;
      --muted: #4a5568;
      --card: #09091a;
      --border: #181830;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ───────────────────────────────────── */
    .hq-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,5,15,0.97);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .hq-brand {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hq-brand .sep { color: var(--border); }
    .hq-brand .live { color: var(--cyan); }

    .hq-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      border: 1px solid;
    }

    .chip.green { color: var(--green); border-color: rgba(34,211,165,0.3); background: rgba(34,211,165,0.07); }
    .chip.cyan  { color: var(--cyan); border-color: rgba(0,245,255,0.2); background: rgba(0,245,255,0.05); }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 2s ease infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 currentColor; }
      50% { opacity:.6; box-shadow: 0 0 0 3px transparent; }
    }

    #clock-display {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── SCENE ────────────────────────────────────── */
    .scene {
      position: relative;
      width: 100%;
      height: 500px;
      overflow: hidden;
      background: linear-gradient(180deg, #02020c 0%, #060614 55%, #08081a 100%);
    }

    #rain-canvas {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* Sky */
    .sky {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .moon {
      position: absolute;
      top: 28px;
      right: 100px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #f0e8d0, #c8b88a);
      box-shadow: 0 0 24px rgba(240,232,208,.35), 0 0 80px rgba(240,232,208,.08);
    }

    .moon::after {
      content: '';
      position: absolute;
      top: -3px; left: 10px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #04040e;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur) ease infinite;
    }

    @keyframes twinkle {
      0%,100% { opacity: var(--a); }
      50% { opacity: calc(var(--a) * 0.3); }
    }

    /* Buildings */
    .bld-layer {
      position: absolute;
      bottom: 70px;
      left: 0; right: 0;
      z-index: 2;
      height: 340px;
    }

    .bld-layer.far  { z-index: 2; filter: brightness(0.4) saturate(0.5); }
    .bld-layer.near { z-index: 4; }

    .bld {
      position: absolute;
      bottom: 0;
      background: #07071a;
      border-top: 1px solid rgba(100,100,200,0.15);
      border-left: 1px solid rgba(100,100,200,0.08);
      border-right: 1px solid rgba(100,100,200,0.08);
      overflow: hidden;
    }

    .win {
      position: absolute;
      border-radius: 1px;
    }

    /* Neon signs on buildings */
    .neon-sign {
      position: absolute;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 3px 6px;
      border: 1px solid currentColor;
      border-radius: 2px;
    }

    /* Ground */
    .sidewalk {
      position: absolute;
      bottom: 70px;
      left: 0; right: 0;
      height: 14px;
      background: #0b0b1e;
      border-top: 1px solid rgba(80,80,180,0.2);
      z-index: 5;
    }

    .road {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 70px;
      background: #060610;
      border-top: 1px solid rgba(80,80,180,0.15);
      z-index: 5;
    }

    /* Road dashes */
    .road::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 2px;
      background: repeating-linear-gradient(90deg,
        rgba(255,255,255,0.07) 0, rgba(255,255,255,0.07) 40px,
        transparent 40px, transparent 90px);
    }

    /* Neon road glow reflection */
    .road-glow {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 70px;
      background: linear-gradient(90deg,
        rgba(0,245,255,0.025) 0%, rgba(168,85,247,0.02) 50%, rgba(0,245,255,0.025) 100%);
      z-index: 6;
      pointer-events: none;
    }

    /* Cars */
    .cars-layer {
      position: absolute;
      bottom: 12px;
      left: 0; right: 0;
      height: 32px;
      z-index: 7;
      pointer-events: none;
    }

    .car {
      position: absolute;
      bottom: 0;
      height: 22px;
      border-radius: 6px 6px 3px 3px;
    }

    .car::before {
      content: '';
      position: absolute;
      top: -10px; left: 18%;
      width: 64%; height: 12px;
      background: inherit;
      border-radius: 5px 5px 0 0;
      opacity: .75;
    }

    /* Headlights */
    .car::after {
      content: '';
      position: absolute;
      right: -28px; top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 5px;
      background: linear-gradient(90deg, rgba(255,255,200,.9), transparent);
      border-radius: 0 3px 3px 0;
    }

    @keyframes car-drive { from { left: -160px; } to { left: calc(100% + 60px); } }

    /* ── AGENTS (bots) ───────────────────────────── */
    .agents-layer {
      position: absolute;
      bottom: 83px;
      left: 0; right: 0;
      height: 120px;
      z-index: 8;
      pointer-events: none;
    }

    .bot {
      position: absolute;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--color);
      animation:
        bot-walk var(--spd) linear var(--dly) infinite,
        bot-bob  0.65s ease-in-out infinite;
    }

    .bot.idle {
      opacity: 0.3;
      animation: bot-walk var(--spd) linear var(--dly) infinite;
    }

    @keyframes bot-walk { from { left: -90px; } to { left: calc(100% + 90px); } }

    @keyframes bot-bob {
      0%,100% { transform: translateY(0) rotate(0deg); }
      25%     { transform: translateY(-7px) rotate(-1.5deg); }
      75%     { transform: translateY(-7px) rotate(1.5deg); }
    }

    .bot-bubble {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: rgba(4,4,14,0.92);
      border: 1px solid currentColor;
      border-radius: 8px;
      padding: 5px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: currentColor;
      box-shadow: 0 0 12px currentColor;
      animation: bubble-fade 5s ease infinite var(--bdly, 0s);
      pointer-events: none;
    }

    .bot-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: currentColor;
    }

    @keyframes bubble-fade {
      0%,8%    { opacity:0; transform: translateX(-50%) translateY(4px); }
      18%,78%  { opacity:1; transform: translateX(-50%) translateY(0); }
      90%,100% { opacity:0; transform: translateX(-50%) translateY(-4px); }
    }

    .bot-name {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 8px currentColor;
      margin-top: 2px;
    }

    .bot-svg {
      filter: drop-shadow(0 0 7px currentColor);
      width: 42px;
      height: 58px;
    }

    /* ── DASHBOARD ────────────────────────────────── */
    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 28px 40px;
    }

    .section-lbl {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-lbl::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Agent cards */
    .agent-cards-row {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .agent-card-mini {
      flex-shrink: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 14px;
      width: 148px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: all 0.25s ease;
    }

    .agent-card-mini.active {
      border-color: rgba(var(--cr), 0.4);
      box-shadow: 0 0 24px rgba(var(--cr), 0.1);
    }

    .agent-card-mini:hover {
      transform: translateY(-3px);
      border-color: rgba(var(--cr), 0.5);
      box-shadow: 0 6px 28px rgba(var(--cr), 0.15);
    }

    .acard-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: rgba(var(--cr), 0.1);
      border: 1px solid rgba(var(--cr), 0.25);
    }

    .acard-name {
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      color: var(--white);
    }

    .acard-status {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      padding: 3px 12px;
      border-radius: 100px;
      border: 1px solid;
    }

    .acard-status.on   { color: var(--green);  border-color: rgba(34,211,165,0.4);  background: rgba(34,211,165,0.08);  }
    .acard-status.idle { color: var(--muted);  border-color: rgba(74,85,104,0.3);   background: rgba(74,85,104,0.06);   }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
    }

    .stat-lbl {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-val {
      font-family: 'Space Mono', monospace;
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-val.c-cyan    { color: var(--cyan); }
    .stat-val.c-purple  { color: var(--purple); }
    .stat-val.c-green   { color: var(--green); }
    .stat-val.c-orange  { color: var(--orange); }

    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Progress bar inside stat */
    .mini-progress {
      margin-top: 10px;
      height: 4px;
      border-radius: 100px;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .mini-progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      width: 0;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
    }

    /* Terminal */
    .terminal {
      background: #040410;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .term-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }

    .term-dots { display: flex; gap: 5px; }
    .term-dot  { width: 11px; height: 11px; border-radius: 50%; }
    .td-r { background: #ff5f57; }
    .td-y { background: #ffbd2e; }
    .td-g { background: #28c840; }

    .term-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      flex: 1;
      text-align: center;
    }

    .term-live {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .term-body {
      padding: 14px 18px;
      height: 190px;
      overflow: hidden;
      position: relative;
    }

    .log-line {
      display: flex;
      gap: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      line-height: 1.9;
      opacity: 0;
      animation: log-in .25s ease forwards;
    }

    @keyframes log-in {
      from { opacity:0; transform: translateX(-6px); }
      to   { opacity:1; transform: translateX(0); }
    }

    .l-time { color: var(--muted); flex-shrink: 0; width: 58px; }
    .l-agent { flex-shrink: 0; width: 170px; }
    .l-agent.cyan    { color: var(--cyan); }
    .l-agent.purple  { color: var(--purple); }
    .l-agent.green   { color: var(--green); }
    .l-agent.magenta { color: var(--magenta); }
    .l-msg { color: rgba(226,232,240,0.75); }

    .cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: var(--cyan);
      animation: cur 1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }

    @keyframes cur { 0%,100% { opacity:1; } 50% { opacity:0; } }

    /* Scanline */
    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      background: repeating-linear-gradient(0deg,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px);
    }

    .sweep {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(transparent, rgba(0,245,255,0.05), transparent);
      animation: sweep 12s linear infinite;
      pointer-events: none;
      z-index: 999;
    }

    @keyframes sweep { from { top:-2px; } to { top:100vh; } }

    @media (max-width: 768px) {
      .scene { height: 340px; }
      .stats-row { grid-template-columns: repeat(2,1fr); }
      .dashboard { padding: 20px 16px; }
    }
  </style>
</head>

</div>

// ── Buildings ───────────────────────────────────────────────────────────────
const WIN_COLORS = [
  'rgba(0,245,255,',
  'rgba(168,85,247,',
  'rgba(255,220,120,',
  'rgba(180,200,255,',
  'rgba(34,211,165,',
];

const NEON_TEXTS = ['SCOUT','INTEL','24/7','LIVE','HQ','DATA'];
const NEON_COLS  = ['#00f5ff','#a855f7','#f97316','#22d3a5','#ec4899'];

function makeBuildings(containerId, count, minH, maxH, minW, maxW, winSize, winGap, containerW) {
  const c = document.getElementById(containerId);
  const slot = containerW / count;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'bld';
    const w = minW + Math.random() * (maxW - minW);
    const h = minH + Math.random() * (maxH - minH);
    const x = i * slot + (slot - w) / 2 + (Math.random() - 0.5) * 20;
    b.style.cssText = `left:${x}px; width:${w}px; height:${h}px;`;

    // Windows
    const cols = Math.floor((w - 8) / (winSize + winGap));
    const rows = Math.floor((h - 8) / (winSize + winGap));
    for (let r = 0; r < rows; r++) {
      for (let cl = 0; cl < cols; cl++) {
        if (Math.random() > 0.38) {
          const win = document.createElement('div');
          win.className = 'win';
          const col = WIN_COLORS[Math.floor(Math.random() * WIN_COLORS.length)];
          const alpha = Math.random() * 0.45 + 0.2;
          const fx = 4 + cl * (winSize + winGap);
          const fy = 4 + r * (winSize + winGap);
          win.style.cssText = `
            left:${fx}px; bottom:${fy}px;
            width:${winSize}px; height:${winSize}px;
            background:${col}${alpha});
          `;
          if (Math.random() > 0.82) {
            const dur = (2 + Math.random() * 6).toFixed(1);
            const dly = (Math.random() * 4).toFixed(1);
            win.style.animation = `twinkle ${dur}s ease infinite ${dly}s`;
            win.style['--a'] = alpha;
          }
          b.appendChild(win);
        }
      }
    }

    // Random neon sign on some buildings
    if (Math.random() > 0.72 && h > 120) {
      const sign = document.createElement('div');
      sign.className = 'neon-sign';
      const nc = NEON_COLS[Math.floor(Math.random() * NEON_COLS.length)];
      const nt = NEON_TEXTS[Math.floor(Math.random() * NEON_TEXTS.length)];
      sign.style.cssText = `
        color:${nc}; right:6px; top:${10 + Math.random()*30}px;
        text-shadow: 0 0 6px ${nc}, 0 0 12px ${nc};
        box-shadow: 0 0 6px ${nc};
        animation: blink ${(1.5+Math.random()*3).toFixed(1)}s ease infinite ${(Math.random()*2).toFixed(1)}s;
      `;
      sign.textContent = nt;
      b.appendChild(sign);
    }

    c.appendChild(b);
  }
}

const W = window.innerWidth;
makeBuildings('bld-far',  16, 80,  180, 45, 90,  5, 4, W);
makeBuildings('bld-near', 12, 130, 310, 65, 130, 8, 5, W);

// ── Rain ────────────────────────────────────────────────────────────────────
const rainCanvas = document.getElementById('rain-canvas');
const rc = rainCanvas.getContext('2d');
let RW, RH, drops = [];

function resizeRain() {
  RW = rainCanvas.width  = rainCanvas.offsetWidth;
  RH = rainCanvas.height = rainCanvas.offsetHeight;
}
resizeRain();
window.addEventListener('resize', resizeRain);

for (let i = 0; i < 120; i++) {
  drops.push({
    x: Math.random() * RW,
    y: Math.random() * RH,
    len: 8 + Math.random() * 14,
    spd: 8 + Math.random() * 10,
    alpha: 0.05 + Math.random() * 0.12,
  });
}

function drawRain() {
  rc.clearRect(0, 0, RW, RH);
  drops.forEach(d => {
    rc.beginPath();
    rc.strokeStyle = `rgba(140,180,255,${d.alpha})`;
    rc.lineWidth = 0.7;
    rc.moveTo(d.x, d.y);
    rc.lineTo(d.x - 1, d.y + d.len);
    rc.stroke();
    d.y += d.spd;
    d.x -= 0.5;
    if (d.y > RH) { d.y = -d.len; d.x = Math.random() * RW; }
  });
  requestAnimationFrame(drawRain);
}
drawRain();

const agentsLayer = document.getElementById('agents-layer');
let msgIndexes = {};

AGENTS.forEach((a, i) => {
  msgIndexes[a.id] = 0;
  const div = document.createElement('div');
  div.className = 'bot' + (a.active ? '' : ' idle');
  div.style.cssText = `--color:${a.color}; --spd:${a.spd}; --dly:${a.dly}; --bdly:${i*0.8}s;`;
  div.id = 'bot-' + a.id;

  if (a.active) {
    const bubble = document.createElement('div');
    bubble.className = 'bot-bubble';
    bubble.id = 'bubble-' + a.id;
    bubble.textContent = a.msgs[0];
    div.appendChild(bubble);
  }

  div.innerHTML += botSVG(a.color);

  const name = document.createElement('div');
  name.className = 'bot-name';
  name.textContent = a.name;
  div.appendChild(name);

  agentsLayer.appendChild(div);
});

// Cycle bubble messages
function cycleBubbles() {
  AGENTS.filter(a => a.active).forEach(a => {
    const bubble = document.getElementById('bubble-' + a.id);
    if (!bubble) return;
    msgIndexes[a.id] = (msgIndexes[a.id] + 1) % a.msgs.length;
    bubble.textContent = a.msgs[msgIndexes[a.id]];
  });
}
setInterval(cycleBubbles, 4500);

// ── Agent cards (dashboard) ─────────────────────────────────────────────────
const cardsRow = document.getElementById('agent-cards-row');
AGENTS.forEach(a => {
  const card = document.createElement('div');
  card.className = 'agent-card-mini' + (a.active ? ' active' : '');
  card.style.setProperty('--cr', a.cr);
  card.innerHTML = `
    <div class="acard-icon" style="--cr:${a.cr};">${a.emoji}</div>
    <div class="acard-name">${a.name}</div>
    <div class="acard-status ${a.active ? 'on' : 'idle'}">${a.active ? 'ON' : 'idle'}</div>
  `;
  cardsRow.appendChild(card);
});

  document.getElementById('rev-bar').style.width = '53%'; // 13.3/25 = 53%
}, 700);

// ── Terminal feed ───────────────────────────────────────────────────────────
const termBody = document.getElementById('term-body');
let logIdx = 0;

function addLog() {
  if (logIdx >= LOG_LINES.length) { logIdx = 0; termBody.innerHTML = ''; }
  const l = LOG_LINES[logIdx++];
  const div = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = `
    <span class="l-time">${l.time}</span>
    <span class="l-agent ${l.cls}">${l.agent}</span>
    <span class="l-msg">${l.msg}</span>
  `;
  termBody.appendChild(div);
  const lines = termBody.querySelectorAll('.log-line');
  if (lines.length > 8) lines[0].remove();
  termBody.querySelectorAll('.cursor').forEach(c => c.remove());
  const cur = document.createElement('span');
  cur.className = 'cursor';
  div.appendChild(cur);
}

setTimeout(() => { addLog(); setInterval(addLog, 1700); }, 800);
</script>
